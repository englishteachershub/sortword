<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Reading Challenge - English Teachers Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f5f7;
    margin: 0;
    padding: 16px;
    color: #1B2A4A;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    text-align: center;
    color: #1B2A4A;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 18px; }

  .mode-toggle {
    display: flex;
    background: #ffffff;
    border: 2px solid #1B2A4A;
    border-radius: 30px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .mode-btn {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    background: #ffffff;
    color: #1B2A4A;
    border: none;
    font-size: 15px;
  }
  .mode-btn.active { background: #1B2A4A; color: #C9A227; }

  /* Lesson Title input - added for Assessment Spreadsheet / PDF feature */
  #lessonTitle {
    width: 100%;
    padding: 12px;
    border: 2px solid #1B2A4A;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    padding: 12px;
    border: 2px solid #1B2A4A;
    border-radius: 10px;
    font-size: 15px;
    resize: vertical;
  }

  .primary-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: #1B2A4A;
    color: #C9A227;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
  }
  .primary-btn:disabled { background: #cccccc; color: #888888; }

  #nameSection { display: none; margin-top: 14px; }
  #nameSection input {
    width: 100%;
    padding: 12px;
    border: 2px solid #1B2A4A;
    border-radius: 10px;
    font-size: 15px;
  }

  .group-title {
    background: #1B2A4A;
    color: #C9A227;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: bold;
    margin: 18px 0 8px 0;
    font-size: 14px;
  }
  .word-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .word-text { font-size: 16px; font-weight: bold; color: #1B2A4A; }
  .word-actions button {
    border: none;
    background: #f0f0f0;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 16px;
    margin-left: 6px;
    cursor: pointer;
  }
  .word-status { font-size: 12px; margin-left: 6px; }
  .status-correct { color: #1a8f3c; font-weight: bold; }
  .status-retry { color: #b34700; font-weight: bold; }

  #testArea { display: none; text-align: center; margin-top: 20px; }
  #testWordBox {
    background: #ffffff;
    border: 3px solid #C9A227;
    border-radius: 14px;
    padding: 30px;
    margin-bottom: 16px;
  }
  #testWordDisplay { font-size: 34px; font-weight: bold; color: #1B2A4A; }
  #testProgress { font-size: 13px; color: #888; margin-top: 6px; }
  #starCount { font-size: 20px; font-weight: bold; color: #C9A227; margin-bottom: 10px; }
  .mic-big-btn {
    background: #1B2A4A;
    color: #C9A227;
    border: none;
    border-radius: 50%;
    width: 74px;
    height: 74px;
    font-size: 30px;
    cursor: pointer;
  }
  .listen-small-btn {
    background: #f0f0f0;
    border: none;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
  }

  #resultScreen { display: none; text-align: center; margin-top: 20px; }
  #resultScreen .score-big { font-size: 40px; color: #C9A227; font-weight: bold; }
  #resultScreen .level-tag {
    display: inline-block;
    background: #1B2A4A;
    color: #C9A227;
    padding: 6px 18px;
    border-radius: 20px;
    font-weight: bold;
    margin-top: 8px;
  }
  .action-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .action-row button {
    flex: 1;
    min-width: 140px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-pdf { background: #1B2A4A; color: #C9A227; }
  .btn-xlsx { background: #1B2A4A; color: #C9A227; border: 2px solid #C9A227; }
  .btn-print { background: #ffffff; color: #1B2A4A; border: 2px solid #1B2A4A; }
  .btn-pdf-assessment { background: #C9A227; color: #1B2A4A; }
  .btn-whatsapp { background: #25D366; color: #ffffff; }
  .btn-retry { background: #eeeeee; color: #1B2A4A; }

  #leaderboard { margin-top: 24px; }
  #leaderboard table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
  #leaderboard th { background: #1B2A4A; color: #C9A227; padding: 8px; font-size: 13px; }
  #leaderboard td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }

  footer { text-align: center; font-size: 12px; color: #999; margin-top: 30px; padding-bottom: 20px; }

  /* ===== Print Assessment Sheet ===== */
  #printableAssessment { display: none; }
  @media print {
    body * { visibility: hidden; }
    #printableAssessment, #printableAssessment * { visibility: visible; }
    #printableAssessment {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      padding: 10mm;
      color: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }
    @page { size: A4 portrait; margin: 10mm; }
  }
  #printableAssessment h2 { text-align: center; margin: 2px 0; font-size: 18px; }
  #printableAssessment .pa-field { margin: 4px 0; font-size: 13px; }
  #printableAssessment .pa-field span { display: inline-block; border-bottom: 1px solid #000; min-width: 220px; }
  #printableAssessment .pa-section {
    background: #e8e8e8; font-weight: bold; padding: 4px 8px; margin-top: 12px; font-size: 13px;
  }
  #printableAssessment table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
  #printableAssessment th, #printableAssessment td {
    border: 1px solid #000; padding: 4px 6px; font-size: 12px; text-align: left;
  }
  #printableAssessment th { background: #f0f0f0; font-weight: bold; }
  #printableAssessment .pa-checkbox { width: 30px; text-align: center; font-size: 14px; }
  #printableAssessment .pa-summary { margin-top: 14px; border-top: 2px solid #000; padding-top: 10px; font-size: 13px; }
  #printableAssessment .pa-line { border-bottom: 1px solid #000; display: inline-block; min-width: 260px; height: 16px; }
</style>
</head>
<body>
<div class="container">

  <h1>Word Reading Challenge</h1>
  <div class="subtitle">English Teachers Hub Theni</div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnPractice" onclick="setMode('practice')">Practice Mode</button>
    <button class="mode-btn" id="btnTest" onclick="setMode('test')">Test Mode</button>
  </div>

  <!-- Lesson Title: feeds automatically into the Assessment Spreadsheet, PDF report, and any future reports -->
  <input type="text" id="lessonTitle" placeholder="Lesson Title (e.g. The Nose Jewel - Unit 1)">

  <textarea id="paragraphInput" placeholder="Paste or type a paragraph here..."></textarea>
  <button class="primary-btn" id="analyzeBtn" onclick="analyzeParagraph()">Sort Words</button>
  <div class="action-row" id="assessmentButtonsTop" style="display:none;">
    <button class="btn-xlsx" onclick="generateSpreadsheet()">📊 Download Excel</button>
    <button class="btn-print" onclick="printAssessmentSheet()">🖨 Print Assessment Sheet</button>
    <button class="btn-pdf-assessment" onclick="generatePDFAssessment()">📄 Download PDF Assessment</button>
  </div>

  <div id="nameSection">
    <input type="text" id="studentName" placeholder="Enter your name to start the test">
    <button class="primary-btn" style="margin-top:8px;" onclick="startTest()">Start Test</button>
  </div>

  <div id="practiceArea"></div>

  <div id="testArea">
    <div id="starCount">Stars: 0</div>
    <div id="testWordBox">
      <div id="testWordDisplay"></div>
      <div id="testProgress"></div>
    </div>
    <button class="mic-big-btn" onclick="startTestListen()">&#127908;</button>
    <br>
    <button class="listen-small-btn" onclick="speakCurrentTestWord()">&#128266;</button>
    <div id="testFeedback" style="margin-top:12px; font-weight:bold;"></div>
  </div>

  <div id="resultScreen">
    <div>Test Complete!</div>
    <div class="score-big" id="finalScore"></div>
    <div class="level-tag" id="readingLevel"></div>
    <div class="action-row">
      <button class="btn-pdf" onclick="generatePDF()">Download PDF Report</button>
      <button class="btn-whatsapp" onclick="shareWhatsApp()">Challenge on WhatsApp</button>
      <button class="btn-retry" onclick="location.reload()">Try Again</button>
    </div>
  </div>

  <div id="leaderboard">
    <div class="group-title">&#127942; Class Leaderboard</div>
    <table>
      <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
      <tbody id="leaderboardBody"><tr><td colspan="3">Loading...</td></tr></tbody>
    </table>
  </div>

  <footer>
    T.S. Ramachandran, ELT, GHSS Erasakkanayakanur, Theni District<br>
    englishteacherhub.blogspot.com
  </footer>

  <!-- Populated dynamically by printAssessmentSheet(); hidden on screen, shown only via @media print -->
  <div id="printableAssessment"></div>

</div>

<script>
(function() {

  // ===== CONFIGURATION =====
  // Paste your Google Apps Script Web App URL here once deployed.
  var SHEET_WEBHOOK_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

  var currentMode = 'practice';
  var wordGroups = {};
  var testWordList = [];
  var testIndex = 0;
  var starCountValue = 0;
  var testResults = [];
  var studentNameValue = "";
  var recognition = null;

  // Reads the Lesson Title input once, reused by the PDF report, the Assessment
  // Spreadsheet, and any future report generators (per app-wide requirement).
  function getLessonTitle() {
    var el = document.getElementById('lessonTitle');
    return el ? el.value.trim() : '';
  }

  window.setMode = function(mode) {
    currentMode = mode;
    document.getElementById('btnPractice').className = mode === 'practice' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('btnTest').className = mode === 'test' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('practiceArea').innerHTML = '';
    document.getElementById('testArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('nameSection').style.display = 'none';
  };

  function cleanWords(paragraph) {
    var raw = paragraph.split(/\s+/);
    var cleaned = [];
    for (var i = 0; i < raw.length; i++) {
      var w = raw[i].replace(/[^a-zA-Z]/g, '');
      if (w.length > 0) cleaned.push(w);
    }
    return cleaned;
  }

  window.analyzeParagraph = function() {
    var text = document.getElementById('paragraphInput').value;
    var words = cleanWords(text);
    if (words.length === 0) {
      alert('Please enter a paragraph first.');
      return;
    }

    wordGroups = {};
    for (var i = 0; i < words.length; i++) {
      var len = words[i].length;
      if (!wordGroups[len]) wordGroups[len] = [];
      if (wordGroups[len].indexOf(words[i]) === -1) wordGroups[len].push(words[i]);
    }

    // Reveal the assessment button group now that words are ready -
    // available in both Practice and Test mode, no need to finish a test first.
    document.getElementById('assessmentButtonsTop').style.display = 'flex';

    if (currentMode === 'practice') {
      renderPractice();
    } else {
      testWordList = words.slice();
      document.getElementById('nameSection').style.display = 'block';
    }
  };

  function renderPractice() {
    var area = document.getElementById('practiceArea');
    area.innerHTML = '';
    var lengths = Object.keys(wordGroups).map(Number).sort(function(a, b) { return a - b; });
    for (var i = 0; i < lengths.length; i++) {
      var len = lengths[i];
      var title = document.createElement('div');
      title.className = 'group-title';
      title.innerText = len + '-Letter Words (' + wordGroups[len].length + ')';
      area.appendChild(title);

      for (var j = 0; j < wordGroups[len].length; j++) {
        var word = wordGroups[len][j];
        var row = document.createElement('div');
        row.className = 'word-row';
        row.innerHTML = '<span class="word-text">' + word + '</span>' +
          '<span class="word-actions">' +
          '<button onclick="speakWord(\'' + word + '\')">&#128266;</button>' +
          '<button onclick="practiceListen(this, \'' + word + '\')">&#127908;</button>' +
          '<span class="word-status" id="status-' + word + '"></span>' +
          '</span>';
        area.appendChild(row);
      }
    }
  }

  window.speakWord = function(word) {
    var utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.85;
    speechSynthesis.speak(utter);
  };

  function getRecognizer() {
    var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) return null;
    var r = new SpeechRec();
    r.lang = 'en-US';
    r.interimResults = false;
    r.maxAlternatives = 1;
    return r;
  }

  window.practiceListen = function(btnEl, word) {
    var rec = getRecognizer();
    var statusEl = document.getElementById('status-' + word);
    if (!rec) {
      statusEl.innerText = 'Mic not supported on this browser';
      return;
    }
    statusEl.innerText = 'Listening...';
    rec.start();
    rec.onresult = function(event) {
      var said = event.results[0][0].transcript.trim().toLowerCase();
      if (said === word.toLowerCase()) {
        statusEl.className = 'word-status status-correct';
        statusEl.innerText = 'Correct!';
      } else {
        statusEl.className = 'word-status status-retry';
        statusEl.innerText = 'Try again (heard: ' + said + ')';
      }
    };
    rec.onerror = function() {
      statusEl.innerText = 'Could not hear you, try again';
    };
  };

  window.startTest = function() {
    studentNameValue = document.getElementById('studentName').value.trim();
    if (!studentNameValue) {
      alert('Please enter your name to start.');
      return;
    }
    document.getElementById('nameSection').style.display = 'none';
    document.getElementById('practiceArea').innerHTML = '';
    document.getElementById('testArea').style.display = 'block';
    testIndex = 0;
    starCountValue = 0;
    testResults = [];
    showTestWord();
  };

  function showTestWord() {
    if (testIndex >= testWordList.length) {
      finishTest();
      return;
    }
    document.getElementById('testWordDisplay').innerText = testWordList[testIndex];
    document.getElementById('testProgress').innerText = 'Word ' + (testIndex + 1) + ' of ' + testWordList.length;
    document.getElementById('starCount').innerText = 'Stars: ' + starCountValue;
    document.getElementById('testFeedback').innerText = '';
  }

  window.speakCurrentTestWord = function() {
    speakWord(testWordList[testIndex]);
  };

  window.startTestListen = function() {
    var rec = getRecognizer();
    var feedback = document.getElementById('testFeedback');
    if (!rec) {
      feedback.innerText = 'Mic not supported on this browser';
      return;
    }
    var currentWord = testWordList[testIndex];
    feedback.innerText = 'Listening...';
    rec.start();
    rec.onresult = function(event) {
      var said = event.results[0][0].transcript.trim().toLowerCase();
      var correct = (said === currentWord.toLowerCase());
      if (correct) {
        starCountValue++;
        feedback.innerText = 'Correct!';
      } else {
        feedback.innerText = 'Incorrect (heard: ' + said + ')';
      }
      testResults.push({ word: currentWord, correct: correct, length: currentWord.length });
      testIndex++;
      setTimeout(showTestWord, 900);
    };
    rec.onerror = function() {
      feedback.innerText = 'Could not hear you, moving on';
      testResults.push({ word: currentWord, correct: false, length: currentWord.length });
      testIndex++;
      setTimeout(showTestWord, 900);
    };
  };

  function getReadingLevel(percent) {
    if (percent < 40) return 'Beginner';
    if (percent < 70) return 'Developing';
    if (percent < 90) return 'Proficient';
    return 'Advanced';
  }

  function finishTest() {
    document.getElementById('testArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    var total = testResults.length;
    var percent = total > 0 ? Math.round((starCountValue / total) * 100) : 0;
    var level = getReadingLevel(percent);
    document.getElementById('finalScore').innerText = starCountValue + ' / ' + total + ' Stars';
    document.getElementById('readingLevel').innerText = 'Reading Level: ' + level;

    submitToScoreboard(studentNameValue, starCountValue, total, level);
    loadLeaderboard();
  }

  window.generatePDF = function() {
    var doc = new jspdf.jsPDF();
    var total = testResults.length;
    var percent = total > 0 ? Math.round((starCountValue / total) * 100) : 0;
    var level = getReadingLevel(percent);

    doc.setFontSize(18);
    doc.setTextColor(27, 42, 74);
    doc.text('Word Reading Challenge - Report', 15, 20);

    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    var lessonTitleValue = getLessonTitle();
    doc.text('Lesson Title: ' + (lessonTitleValue || '-'), 15, 32);
    doc.text('Student Name: ' + studentNameValue, 15, 39);
    doc.text('Date: ' + new Date().toLocaleDateString(), 15, 46);
    doc.text('Score: ' + starCountValue + ' / ' + total, 15, 53);
    doc.text('Reading Level: ' + level, 15, 60);

    doc.setFontSize(13);
    doc.setTextColor(27, 42, 74);
    doc.text('Word-by-word Results:', 15, 72);

    var y = 80;
    doc.setFontSize(10);
    for (var i = 0; i < testResults.length; i++) {
      var r = testResults[i];
      var status = r.correct ? 'Correct' : 'Incorrect';
      if (r.correct) {
        doc.setTextColor(0, 130, 0);
      } else {
        doc.setTextColor(180, 0, 0);
      }
      doc.text(r.word + ' (' + r.length + ' letters) - ' + status, 15, y);
      y += 7;
      if (y > 280) {
        doc.addPage();
        y = 20;
      }
    }

    doc.setTextColor(120, 120, 120);
    doc.setFontSize(9);
    doc.text('T.S. Ramachandran, ELT, GHSS Erasakkanayakanur, Theni District', 15, 290);

    doc.save(studentNameValue + '_Reading_Report.pdf');
  };

  // ===== SHARED ASSESSMENT DATA BUILDER =====
  // Reused by the Excel, Print, and PDF Assessment generators so the word
  // list is only sorted/de-duplicated once (single source of truth).
  function buildAssessmentData() {
    var lengths = Object.keys(wordGroups).map(Number).sort(function(a, b) { return a - b; });
    var groupsSorted = {};
    var totalUnique = 0;
    for (var i = 0; i < lengths.length; i++) {
      var len = lengths[i];
      groupsSorted[len] = wordGroups[len].slice().sort(function(a, b) {
        return a.toLowerCase().localeCompare(b.toLowerCase());
      });
      totalUnique += groupsSorted[len].length;
    }
    return {
      lengths: lengths,
      groups: groupsSorted,
      totalUnique: totalUnique,
      lessonTitle: getLessonTitle(),
      studentName: studentNameValue
    };
  }

  // ===== ASSESSMENT SPREADSHEET (SheetJS / .xlsx) =====
  // Builds an offline, print-friendly (A4 portrait) checklist spreadsheet:
  // words de-duplicated, punctuation-free, grouped by letter-count, and
  // alphabetised within each group. Each group gets its own ✓ | Word | Remarks
  // mini-table (single checkbox per word) instead of a flat list.
  window.generateSpreadsheet = function() {
    if (!wordGroups || Object.keys(wordGroups).length === 0) {
      alert('Please click "Sort Words" first so the words can be analysed.');
      return;
    }
    if (typeof XLSX === 'undefined') {
      alert('Spreadsheet library did not load. Please check your internet connection and try again.');
      return;
    }

    var data = buildAssessmentData();

    // aoa = "array of arrays" -> one array per spreadsheet row, 3 columns:
    // A = checkbox, B = Word, C = Remarks
    var aoa = [];
    var merges = [];    // merged cell ranges
    var boldRows = [];  // bold row indices (0-based)
    var greyRows = [];  // grey-filled section-heading rows
    var tableHeaderRows = []; // light-grey "✓ | Word | Remarks" header rows

    // Push a row spanning all 3 columns (A:C), optionally bold/grey (section heading)
    function addFullRow(text, bold, grey) {
      var r = aoa.length;
      aoa.push([text, '', '']);
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 2 } });
      if (bold) boldRows.push(r);
      if (grey) greyRows.push(r);
    }

    // Push a label + blank-answer row (label spans A:B, answer sits in C)
    function addLabelRow(label, value) {
      var r = aoa.length;
      aoa.push([label, '', value || '']);
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 1 } });
    }

    // Push the mini table header row: ✓ | Word | Remarks
    function addTableHeader() {
      var r = aoa.length;
      aoa.push(['\u2713', 'Word', 'Remarks']);
      tableHeaderRows.push(r);
    }

    // ---- Title block (merged across A:C as requested) ----
    addFullRow('ENGLISH TEACHERS HUB', true);
    addFullRow('WORD READING ASSESSMENT', true);
    aoa.push(['', '', '']);

    // ---- Lesson / student / school details (rows 4-10, kept visible via freeze panes) ----
    addLabelRow('Lesson Title :', data.lessonTitle);
    addLabelRow('Student Name :', data.studentName);
    addLabelRow('Class :', '');
    addLabelRow('Section :', '');
    addLabelRow('School :', '');
    addLabelRow('Date :', '');
    addLabelRow('Teacher :', '');
    aoa.push(['', '', '']);

    // ---- Word checklist: one ✓ | Word | Remarks table per letter-length group ----
    for (var i = 0; i < data.lengths.length; i++) {
      var len = data.lengths[i];
      var group = data.groups[len];

      addFullRow(len + ' LETTER WORDS', true, true);
      addTableHeader();
      for (var j = 0; j < group.length; j++) {
        aoa.push(['\u2610', group[j], '']); // \u2610 = ☐ checkbox glyph, own column
      }
      aoa.push(['', '', '']); // spacer between groups
    }

    // ---- Summary box ----
    addFullRow('SUMMARY', true, true);
    addLabelRow('Total Unique Words :', String(data.totalUnique));
    addLabelRow('Words Read Correctly :', '');
    addLabelRow('Reading Accuracy (%) :', '');
    aoa.push(['', '', '']);
    addFullRow('Teacher Remarks :', true);
    aoa.push(['', '', '']);
    aoa.push(['', '', '']);
    aoa.push(['', '', '']);
    addLabelRow('Teacher Signature :', '');
    aoa.push(['', '', '']);

    // ---- Build the worksheet ----
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = merges;

    // Column widths - comfortable for A4 portrait printing
    ws['!cols'] = [{ wch: 8 }, { wch: 26 }, { wch: 22 }];

    // Row heights - comfortable, slightly taller for section headings
    ws['!rows'] = aoa.map(function(_, idx) {
      return { hpt: greyRows.indexOf(idx) !== -1 ? 20 : 17 };
    });

    // ---- Styling: dark blue title, grey section/table headers, thin borders,
    // bold headings only - no bright colours (best-effort; see note below) ----
    var thinBorder = { style: 'thin', color: { rgb: '000000' } };
    var borderAll = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
    Object.keys(ws).forEach(function(cellRef) {
      if (cellRef[0] === '!') return;
      ws[cellRef].s = ws[cellRef].s || {};
      ws[cellRef].s.border = borderAll;
      ws[cellRef].s.alignment = { vertical: 'center', horizontal: 'left', wrapText: true };
    });
    // Centre the checkbox column
    for (var rr = 0; rr < aoa.length; rr++) {
      var checkRef = 'A' + (rr + 1);
      if (ws[checkRef] && (ws[checkRef].v === '\u2610' || ws[checkRef].v === '\u2713')) {
        ws[checkRef].s.alignment.horizontal = 'center';
      }
    }
    boldRows.forEach(function(r) {
      ['A', 'B', 'C'].forEach(function(col) {
        var ref = col + (r + 1);
        if (ws[ref]) ws[ref].s.font = { bold: true, color: { rgb: r < 2 ? '1B2A4A' : '000000' } };
      });
    });
    greyRows.forEach(function(r) {
      ['A', 'B', 'C'].forEach(function(col) {
        var ref = col + (r + 1);
        if (ws[ref]) ws[ref].s.fill = { fgColor: { rgb: 'D9D9D9' } };
      });
    });
    tableHeaderRows.forEach(function(r) {
      ['A', 'B', 'C'].forEach(function(col) {
        var ref = col + (r + 1);
        if (ws[ref]) {
          ws[ref].s.fill = { fgColor: { rgb: 'F0F0F0' } };
          ws[ref].s.font = { bold: true };
        }
      });
    });

    // ---- Print setup: Portrait, A4, centred horizontally, narrow margins ----
    ws['!margins'] = { left: 0.25, right: 0.25, top: 0.75, bottom: 0.75, header: 0.3, footer: 0.3 };
    ws['!pageSetup'] = { orientation: 'portrait', paperSize: 9, fitToWidth: 1, fitToHeight: 0 };
    ws['!printOptions'] = { horizontalCentered: true, gridLines: false };

    // ---- Freeze the first 10 rows so student details stay visible while scrolling ----
    ws['!freeze'] = { xSplit: 0, ySplit: 10, topLeftCell: 'A11', activePane: 'bottomLeft', state: 'frozen' };

    // ---- Assemble workbook ----
    var wbOut = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wbOut, ws, 'Assessment');

    // Repeat the title rows (1-2) at the top of every printed page
    wbOut.Workbook = wbOut.Workbook || {};
    wbOut.Workbook.Names = wbOut.Workbook.Names || [];
    wbOut.Workbook.Names.push({ Name: '_xlnm.Print_Titles', Sheet: 0, Ref: "'Assessment'!$1:$2" });

    var safeLesson = (data.lessonTitle || 'Lesson').replace(/[^a-zA-Z0-9]+/g, '_');
    var safeName = (data.studentName || 'Student').replace(/[^a-zA-Z0-9]+/g, '_');
    XLSX.writeFile(wbOut, safeLesson + '_' + safeName + '_Word_Assessment.xlsx');
  };

  // ===== PRINT ASSESSMENT SHEET (browser print, no download) =====
  // Builds the same checklist as plain HTML inside #printableAssessment and
  // triggers window.print(); CSS @media print rules hide everything else.
  window.printAssessmentSheet = function() {
    if (!wordGroups || Object.keys(wordGroups).length === 0) {
      alert('Please click "Sort Words" first so the words can be analysed.');
      return;
    }
    var data = buildAssessmentData();
    var html = '';
    html += '<h2>ENGLISH TEACHERS HUB</h2>';
    html += '<h2 style="font-size:14px;">WORD READING ASSESSMENT</h2>';
    html += '<div class="pa-field">Lesson Title : <span>' + (data.lessonTitle || '') + '</span></div>';
    html += '<div class="pa-field">Student Name : <span>' + (data.studentName || '') + '</span></div>';
    html += '<div class="pa-field">Class : <span style="min-width:100px;"></span>&nbsp;&nbsp;Section : <span style="min-width:100px;"></span></div>';
    html += '<div class="pa-field">School : <span></span></div>';
    html += '<div class="pa-field">Date : <span style="min-width:100px;"></span>&nbsp;&nbsp;Teacher : <span style="min-width:150px;"></span></div>';

    for (var i = 0; i < data.lengths.length; i++) {
      var len = data.lengths[i];
      var group = data.groups[len];
      html += '<div class="pa-section">' + len + ' LETTER WORDS</div>';
      html += '<table><thead><tr><th class="pa-checkbox">&#10003;</th><th>Word</th><th>Remarks</th></tr></thead><tbody>';
      for (var j = 0; j < group.length; j++) {
        html += '<tr><td class="pa-checkbox">&#9744;</td><td>' + group[j] + '</td><td></td></tr>';
      }
      html += '</tbody></table>';
    }

    html += '<div class="pa-summary">';
    html += '<div class="pa-field">Total Unique Words : <b>' + data.totalUnique + '</b></div>';
    html += '<div class="pa-field">Words Read Correctly : <span></span></div>';
    html += '<div class="pa-field">Reading Accuracy : <span style="min-width:60px;"></span> %</div>';
    html += '<div class="pa-field" style="margin-top:10px;">Teacher Remarks</div>';
    html += '<div class="pa-field"><span class="pa-line"></span></div>';
    html += '<div class="pa-field" style="margin-top:14px;">Teacher Signature</div>';
    html += '<div class="pa-field"><span class="pa-line"></span></div>';
    html += '</div>';

    document.getElementById('printableAssessment').innerHTML = html;
    window.print();
  };

  // ===== DOWNLOAD PDF ASSESSMENT (jsPDF - same checklist as the Excel/print sheet) =====
  window.generatePDFAssessment = function() {
    if (!wordGroups || Object.keys(wordGroups).length === 0) {
      alert('Please click "Sort Words" first so the words can be analysed.');
      return;
    }
    if (typeof jspdf === 'undefined') {
      alert('PDF library did not load. Please check your internet connection and try again.');
      return;
    }
    var data = buildAssessmentData();
    var doc = new jspdf.jsPDF({ unit: 'mm', format: 'a4' });
    var pageH = 297, marginX = 15, y = 18;

    function ensureSpace(need) {
      if (y + need > pageH - 15) { doc.addPage(); y = 18; }
    }

    doc.setFontSize(16);
    doc.setTextColor(27, 42, 74);
    doc.text('ENGLISH TEACHERS HUB', 105, y, { align: 'center' }); y += 7;
    doc.setFontSize(12);
    doc.text('WORD READING ASSESSMENT', 105, y, { align: 'center' }); y += 10;

    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    doc.text('Lesson Title : ' + (data.lessonTitle || '-'), marginX, y); y += 7;
    doc.text('Student Name : ' + (data.studentName || '-'), marginX, y); y += 7;
    doc.text('Class : ____________     Section : ____________', marginX, y); y += 7;
    doc.text('School : _______________________________', marginX, y); y += 7;
    doc.text('Date : ____________     Teacher : ____________', marginX, y); y += 10;

    for (var i = 0; i < data.lengths.length; i++) {
      var len = data.lengths[i];
      var group = data.groups[len];
      ensureSpace(14);
      doc.setFillColor(217, 217, 217);
      doc.rect(marginX, y - 4, 180, 6, 'F');
      doc.setFontSize(11);
      doc.setTextColor(27, 42, 74);
      doc.text(len + ' LETTER WORDS', marginX + 2, y);
      y += 8;

      doc.setFontSize(10);
      doc.setTextColor(0, 0, 0);
      for (var j = 0; j < group.length; j++) {
        ensureSpace(7);
        doc.rect(marginX, y - 3.5, 4, 4); // checkbox square
        doc.text(group[j], marginX + 8, y);
        y += 6.5;
      }
      y += 3;
    }

    ensureSpace(45);
    doc.setDrawColor(0, 0, 0);
    doc.line(marginX, y, marginX + 180, y); y += 8;
    doc.setFontSize(11);
    doc.text('Total Unique Words : ' + data.totalUnique, marginX, y); y += 7;
    doc.text('Words Read Correctly : ____________', marginX, y); y += 7;
    doc.text('Reading Accuracy : ____________ %', marginX, y); y += 10;
    doc.text('Teacher Remarks', marginX, y); y += 10;
    doc.line(marginX, y, marginX + 180, y); y += 14;
    doc.text('Teacher Signature', marginX, y); y += 10;
    doc.line(marginX, y, marginX + 90, y);

    doc.setTextColor(120, 120, 120);
    doc.setFontSize(9);
    doc.text('T.S. Ramachandran, ELT, GHSS Erasakkanayakanur, Theni District', marginX, pageH - 10);

    var safeLesson = (data.lessonTitle || 'Lesson').replace(/[^a-zA-Z0-9]+/g, '_');
    var safeName = (data.studentName || 'Student').replace(/[^a-zA-Z0-9]+/g, '_');
    doc.save(safeLesson + '_' + safeName + '_Assessment.pdf');
  };

  window.shareWhatsApp = function() {
    var total = testResults.length;
    var msg = 'I scored ' + starCountValue + '/' + total + ' stars in the Word Reading Challenge on English Teachers Hub! Can you beat me? englishteacherhub.blogspot.com';
    var url = 'https://wa.me/?text=' + encodeURIComponent(msg);
    window.open(url, '_blank');
  };

  function submitToScoreboard(name, stars, total, level) {
    if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.indexOf('PASTE_YOUR') === 0) return;
    fetch(SHEET_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, stars: stars, total: total, level: level, date: new Date().toISOString() })
    }).catch(function(err) { console.log('Scoreboard submit failed', err); });
  }

  function loadLeaderboard() {
    var body = document.getElementById('leaderboardBody');
    if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.indexOf('PASTE_YOUR') === 0) {
      body.innerHTML = '<tr><td colspan="3">Scoreboard not connected yet</td></tr>';
      return;
    }
    fetch(SHEET_WEBHOOK_URL)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        body.innerHTML = '';
        var sorted = data.sort(function(a, b) { return b.stars - a.stars; }).slice(0, 10);
        for (var i = 0; i < sorted.length; i++) {
          var row = document.createElement('tr');
          row.innerHTML = '<td>' + (i + 1) + '</td><td>' + sorted[i].name + '</td><td>' + sorted[i].stars + '/' + sorted[i].total + '</td>';
          body.appendChild(row);
        }
      })
      .catch(function(err) {
        body.innerHTML = '<tr><td colspan="3">Could not load leaderboard</td></tr>';
      });
  }

  loadLeaderboard();

})();
</script>
