<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Reading Challenge - English Teachers Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f5f7;
    margin: 0;
    padding: 16px;
    color: #1B2A4A;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    text-align: center;
    color: #1B2A4A;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 18px; }

  .mode-toggle {
    display: flex;
    background: #ffffff;
    border: 2px solid #1B2A4A;
    border-radius: 30px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .mode-btn {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    background: #ffffff;
    color: #1B2A4A;
    border: none;
    font-size: 15px;
  }
  .mode-btn.active { background: #1B2A4A; color: #C9A227; }

  textarea {
    width: 100%;
    min-height: 110px;
    padding: 12px;
    border: 2px solid #1B2A4A;
    border-radius: 10px;
    font-size: 15px;
    resize: vertical;
  }

  .primary-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: #1B2A4A;
    color: #C9A227;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
  }
  .primary-btn:disabled { background: #cccccc; color: #888888; }

  #nameSection { display: none; margin-top: 14px; }
  #nameSection input {
    width: 100%;
    padding: 12px;
    border: 2px solid #1B2A4A;
    border-radius: 10px;
    font-size: 15px;
  }

  .group-title {
    background: #1B2A4A;
    color: #C9A227;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: bold;
    margin: 18px 0 8px 0;
    font-size: 14px;
  }
  .word-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .word-text { font-size: 16px; font-weight: bold; color: #1B2A4A; }
  .word-actions button {
    border: none;
    background: #f0f0f0;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 16px;
    margin-left: 6px;
    cursor: pointer;
  }
  .word-status { font-size: 12px; margin-left: 6px; }
  .status-correct { color: #1a8f3c; font-weight: bold; }
  .status-retry { color: #b34700; font-weight: bold; }

  #testArea { display: none; text-align: center; margin-top: 20px; }
  #testWordBox {
    background: #ffffff;
    border: 3px solid #C9A227;
    border-radius: 14px;
    padding: 30px;
    margin-bottom: 16px;
  }
  #testWordDisplay { font-size: 34px; font-weight: bold; color: #1B2A4A; }
  #testProgress { font-size: 13px; color: #888; margin-top: 6px; }
  #starCount { font-size: 20px; font-weight: bold; color: #C9A227; margin-bottom: 10px; }
  .mic-big-btn {
    background: #1B2A4A;
    color: #C9A227;
    border: none;
    border-radius: 50%;
    width: 74px;
    height: 74px;
    font-size: 30px;
    cursor: pointer;
  }
  .listen-small-btn {
    background: #f0f0f0;
    border: none;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
  }

  #resultScreen { display: none; text-align: center; margin-top: 20px; }
  #resultScreen .score-big { font-size: 40px; color: #C9A227; font-weight: bold; }
  #resultScreen .level-tag {
    display: inline-block;
    background: #1B2A4A;
    color: #C9A227;
    padding: 6px 18px;
    border-radius: 20px;
    font-weight: bold;
    margin-top: 8px;
  }
  .action-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .action-row button {
    flex: 1;
    min-width: 140px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-pdf { background: #1B2A4A; color: #C9A227; }
  .btn-whatsapp { background: #25D366; color: #ffffff; }
  .btn-retry { background: #eeeeee; color: #1B2A4A; }

  #leaderboard { margin-top: 24px; }
  #leaderboard table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
  #leaderboard th { background: #1B2A4A; color: #C9A227; padding: 8px; font-size: 13px; }
  #leaderboard td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }

  footer { text-align: center; font-size: 12px; color: #999; margin-top: 30px; padding-bottom: 20px; }
</style>
</head>
<body>
<div class="container">

  <h1>Word Reading Challenge</h1>
  <div class="subtitle">English Teachers Hub Theni</div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnPractice" onclick="setMode('practice')">Practice Mode</button>
    <button class="mode-btn" id="btnTest" onclick="setMode('test')">Test Mode</button>
  </div>

  <textarea id="paragraphInput" placeholder="Paste or type a paragraph here..."></textarea>
  <button class="primary-btn" id="analyzeBtn" onclick="analyzeParagraph()">Sort Words</button>

  <div id="nameSection">
    <input type="text" id="studentName" placeholder="Enter your name to start the test">
    <button class="primary-btn" style="margin-top:8px;" onclick="startTest()">Start Test</button>
  </div>

  <div id="practiceArea"></div>

  <div id="testArea">
    <div id="starCount">Stars: 0</div>
    <div id="testWordBox">
      <div id="testWordDisplay"></div>
      <div id="testProgress"></div>
    </div>
    <button class="mic-big-btn" onclick="startTestListen()">&#127908;</button>
    <br>
    <button class="listen-small-btn" onclick="speakCurrentTestWord()">&#128266;</button>
    <div id="testFeedback" style="margin-top:12px; font-weight:bold;"></div>
  </div>

  <div id="resultScreen">
    <div>Test Complete!</div>
    <div class="score-big" id="finalScore"></div>
    <div class="level-tag" id="readingLevel"></div>
    <div class="action-row">
      <button class="btn-pdf" onclick="generatePDF()">Download PDF Report</button>
      <button class="btn-whatsapp" onclick="shareWhatsApp()">Challenge on WhatsApp</button>
      <button class="btn-retry" onclick="location.reload()">Try Again</button>
    </div>
  </div>

  <div id="leaderboard">
    <div class="group-title">&#127942; Class Leaderboard</div>
    <table>
      <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
      <tbody id="leaderboardBody"><tr><td colspan="3">Loading...</td></tr></tbody>
    </table>
  </div>

  <footer>
    T.S. Ramachandran, ELT, GHSS Erasakkanayakanur, Theni District<br>
    englishteacherhub.blogspot.com
  </footer>

</div>

<script>
(function() {

  // ===== CONFIGURATION =====
  // Paste your Google Apps Script Web App URL here once deployed.
  var SHEET_WEBHOOK_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

  var currentMode = 'practice';
  var wordGroups = {};
  var testWordList = [];
  var testIndex = 0;
  var starCountValue = 0;
  var testResults = [];
  var studentNameValue = "";
  var recognition = null;

  window.setMode = function(mode) {
    currentMode = mode;
    document.getElementById('btnPractice').className = mode === 'practice' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('btnTest').className = mode === 'test' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('practiceArea').innerHTML = '';
    document.getElementById('testArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('nameSection').style.display = 'none';
  };

  function cleanWords(paragraph) {
    var raw = paragraph.split(/\s+/);
    var cleaned = [];
    for (var i = 0; i < raw.length; i++) {
      var w = raw[i].replace(/[^a-zA-Z]/g, '');
      if (w.length > 0) cleaned.push(w);
    }
    return cleaned;
  }

  window.analyzeParagraph = function() {
    var text = document.getElementById('paragraphInput').value;
    var words = cleanWords(text);
    if (words.length === 0) {
      alert('Please enter a paragraph first.');
      return;
    }

    wordGroups = {};
    for (var i = 0; i < words.length; i++) {
      var len = words[i].length;
      if (!wordGroups[len]) wordGroups[len] = [];
      if (wordGroups[len].indexOf(words[i]) === -1) wordGroups[len].push(words[i]);
    }

    if (currentMode === 'practice') {
      renderPractice();
    } else {
      testWordList = words.slice();
      document.getElementById('nameSection').style.display = 'block';
    }
  };

  function renderPractice() {
    var area = document.getElementById('practiceArea');
    area.innerHTML = '';
    var lengths = Object.keys(wordGroups).map(Number).sort(function(a, b) { return a - b; });
    for (var i = 0; i < lengths.length; i++) {
      var len = lengths[i];
      var title = document.createElement('div');
      title.className = 'group-title';
      title.innerText = len + '-Letter Words (' + wordGroups[len].length + ')';
      area.appendChild(title);

      for (var j = 0; j < wordGroups[len].length; j++) {
        var word = wordGroups[len][j];
        var row = document.createElement('div');
        row.className = 'word-row';
        row.innerHTML = '<span class="word-text">' + word + '</span>' +
          '<span class="word-actions">' +
          '<button onclick="speakWord(\'' + word + '\')">&#128266;</button>' +
          '<button onclick="practiceListen(this, \'' + word + '\')">&#127908;</button>' +
          '<span class="word-status" id="status-' + word + '"></span>' +
          '</span>';
        area.appendChild(row);
      }
    }
  }

  window.speakWord = function(word) {
    var utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.85;
    speechSynthesis.speak(utter);
  };

  function getRecognizer() {
    var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) return null;
    var r = new SpeechRec();
    r.lang = 'en-US';
    r.interimResults = false;
    r.maxAlternatives = 1;
    return r;
  }

  window.practiceListen = function(btnEl, word) {
    var rec = getRecognizer();
    var statusEl = document.getElementById('status-' + word);
    if (!rec) {
      statusEl.innerText = 'Mic not supported on this browser';
      return;
    }
    statusEl.innerText = 'Listening...';
    rec.start();
    rec.onresult = function(event) {
      var said = event.results[0][0].transcript.trim().toLowerCase();
      if (said === word.toLowerCase()) {
        statusEl.className = 'word-status status-correct';
        statusEl.innerText = 'Correct!';
      } else {
        statusEl.className = 'word-status status-retry';
        statusEl.innerText = 'Try again (heard: ' + said + ')';
      }
    };
    rec.onerror = function() {
      statusEl.innerText = 'Could not hear you, try again';
    };
  };

  window.startTest = function() {
    studentNameValue = document.getElementById('studentName').value.trim();
    if (!studentNameValue) {
      alert('Please enter your name to start.');
      return;
    }
    document.getElementById('nameSection').style.display = 'none';
    document.getElementById('practiceArea').innerHTML = '';
    document.getElementById('testArea').style.display = 'block';
    testIndex = 0;
    starCountValue = 0;
    testResults = [];
    showTestWord();
  };

  function showTestWord() {
    if (testIndex >= testWordList.length) {
      finishTest();
      return;
    }
    document.getElementById('testWordDisplay').innerText = testWordList[testIndex];
    document.getElementById('testProgress').innerText = 'Word ' + (testIndex + 1) + ' of ' + testWordList.length;
    document.getElementById('starCount').innerText = 'Stars: ' + starCountValue;
    document.getElementById('testFeedback').innerText = '';
  }

  window.speakCurrentTestWord = function() {
    speakWord(testWordList[testIndex]);
  };

  window.startTestListen = function() {
    var rec = getRecognizer();
    var feedback = document.getElementById('testFeedback');
    if (!rec) {
      feedback.innerText = 'Mic not supported on this browser';
      return;
    }
    var currentWord = testWordList[testIndex];
    feedback.innerText = 'Listening...';
    rec.start();
    rec.onresult = function(event) {
      var said = event.results[0][0].transcript.trim().toLowerCase();
      var correct = (said === currentWord.toLowerCase());
      if (correct) {
        starCountValue++;
        feedback.innerText = 'Correct!';
      } else {
        feedback.innerText = 'Incorrect (heard: ' + said + ')';
      }
      testResults.push({ word: currentWord, correct: correct, length: currentWord.length });
      testIndex++;
      setTimeout(showTestWord, 900);
    };
    rec.onerror = function() {
      feedback.innerText = 'Could not hear you, moving on';
      testResults.push({ word: currentWord, correct: false, length: currentWord.length });
      testIndex++;
      setTimeout(showTestWord, 900);
    };
  };

  function getReadingLevel(percent) {
    if (percent < 40) return 'Beginner';
    if (percent < 70) return 'Developing';
    if (percent < 90) return 'Proficient';
    return 'Advanced';
  }

  function finishTest() {
    document.getElementById('testArea').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    var total = testResults.length;
    var percent = total > 0 ? Math.round((starCountValue / total) * 100) : 0;
    var level = getReadingLevel(percent);
    document.getElementById('finalScore').innerText = starCountValue + ' / ' + total + ' Stars';
    document.getElementById('readingLevel').innerText = 'Reading Level: ' + level;

    submitToScoreboard(studentNameValue, starCountValue, total, level);
    loadLeaderboard();
  }

  window.generatePDF = function() {
    var doc = new jspdf.jsPDF();
    var total = testResults.length;
    var percent = total > 0 ? Math.round((starCountValue / total) * 100) : 0;
    var level = getReadingLevel(percent);

    doc.setFontSize(18);
    doc.setTextColor(27, 42, 74);
    doc.text('Word Reading Challenge - Report', 15, 20);

    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    doc.text('Student Name: ' + studentNameValue, 15, 32);
    doc.text('Date: ' + new Date().toLocaleDateString(), 15, 39);
    doc.text('Score: ' + starCountValue + ' / ' + total, 15, 46);
    doc.text('Reading Level: ' + level, 15, 53);

    doc.setFontSize(13);
    doc.setTextColor(27, 42, 74);
    doc.text('Word-by-word Results:', 15, 65);

    var y = 73;
    doc.setFontSize(10);
    for (var i = 0; i < testResults.length; i++) {
      var r = testResults[i];
      var status = r.correct ? 'Correct' : 'Incorrect';
      if (r.correct) {
        doc.setTextColor(0, 130, 0);
      } else {
        doc.setTextColor(180, 0, 0);
      }
      doc.text(r.word + ' (' + r.length + ' letters) - ' + status, 15, y);
      y += 7;
      if (y > 280) {
        doc.addPage();
        y = 20;
      }
    }

    doc.setTextColor(120, 120, 120);
    doc.setFontSize(9);
    doc.text('T.S. Ramachandran, ELT, GHSS Erasakkanayakanur, Theni District', 15, 290);

    doc.save(studentNameValue + '_Reading_Report.pdf');
  };

  window.shareWhatsApp = function() {
    var total = testResults.length;
    var msg = 'I scored ' + starCountValue + '/' + total + ' stars in the Word Reading Challenge on English Teachers Hub! Can you beat me? englishteacherhub.blogspot.com';
    var url = 'https://wa.me/?text=' + encodeURIComponent(msg);
    window.open(url, '_blank');
  };

  function submitToScoreboard(name, stars, total, level) {
    if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.indexOf('PASTE_YOUR') === 0) return;
    fetch(SHEET_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, stars: stars, total: total, level: level, date: new Date().toISOString() })
    }).catch(function(err) { console.log('Scoreboard submit failed', err); });
  }

  function loadLeaderboard() {
    var body = document.getElementById('leaderboardBody');
    if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.indexOf('PASTE_YOUR') === 0) {
      body.innerHTML = '<tr><td colspan="3">Scoreboard not connected yet</td></tr>';
      return;
    }
    fetch(SHEET_WEBHOOK_URL)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        body.innerHTML = '';
        var sorted = data.sort(function(a, b) { return b.stars - a.stars; }).slice(0, 10);
        for (var i = 0; i < sorted.length; i++) {
          var row = document.createElement('tr');
          row.innerHTML = '<td>' + (i + 1) + '</td><td>' + sorted[i].name + '</td><td>' + sorted[i].stars + '/' + sorted[i].total + '</td>';
          body.appendChild(row);
        }
      })
      .catch(function(err) {
        body.innerHTML = '<tr><td colspan="3">Could not load leaderboard</td></tr>';
      });
  }

  loadLeaderboard();

})();
</script>
</body>
</html>
